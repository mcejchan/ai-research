name: Deploy Quiz to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'quiz/**'
      - '.github/workflows/deploy-quiz.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build levels index
        run: node quiz/build-index.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quiz

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
