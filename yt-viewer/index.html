<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Knowledge Base</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; }
  #sidebar { width: 280px; min-width: 280px; background: #16213e; overflow-y: auto; border-right: 1px solid #0f3460; }
  #sidebar h2 { padding: 16px; font-size: 14px; color: #e94560; text-transform: uppercase; letter-spacing: 1px; }
  .channel { padding: 10px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f3460; font-size: 13px; }
  .channel:hover, .channel.active { background: #0f3460; }
  .channel .count { background: #e94560; color: #fff; border-radius: 10px; padding: 2px 8px; font-size: 11px; }
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #video-list { padding: 12px; display: flex; flex-wrap: wrap; gap: 8px; overflow-y: auto; max-height: 200px; min-height: 60px; border-bottom: 1px solid #0f3460; background: #16213e; }
  .video-card { padding: 8px 12px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .video-card:hover, .video-card.active { border-color: #e94560; }
  .video-card .date { color: #888; font-size: 10px; }
  #content-area { flex: 1; overflow-y: auto; padding: 24px; }
  #content-area h1, #content-area h2, #content-area h3 { color: #e94560; margin: 16px 0 8px; }
  #content-area p { line-height: 1.7; margin-bottom: 12px; }
  #content-area ul, #content-area ol { margin: 8px 0 8px 24px; }
  #content-area li { margin-bottom: 4px; line-height: 1.6; }
  #content-area code { background: #0f3460; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
  #content-area pre { background: #0f3460; padding: 16px; border-radius: 6px; overflow-x: auto; margin: 12px 0; }
  #content-area blockquote { border-left: 3px solid #e94560; padding-left: 12px; color: #aaa; margin: 12px 0; }
  #toolbar { padding: 8px 16px; background: #16213e; border-bottom: 1px solid #0f3460; display: none; }
  #toolbar button { background: #0f3460; color: #e0e0e0; border: 1px solid #e94560; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 8px; }
  #toolbar button.active { background: #e94560; color: #fff; }
  .empty { color: #666; padding: 40px; text-align: center; }
  a { color: #e94560; }
</style>
</head>
<body>
<div id="sidebar">
  <h2>📺 YT Knowledge Base</h2>
  <div id="channel-list"></div>
</div>
<div id="main">
  <div id="video-list"><div class="empty">Select a channel</div></div>
  <div id="toolbar">
    <button id="btn-analysis" class="active" onclick="showTab('analysis')">Analysis</button>
    <button id="btn-transcript" onclick="showTab('transcript')">Transcript</button>
  </div>
  <div id="content-area"><div class="empty">Select a video to view its analysis</div></div>
</div>
<script>
const $ = (s) => document.querySelector(s);
let current = { channel: null, folder: null, tab: 'analysis' };
let cache = {};

function formatTitle(slug) {
  return slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

async function loadChannels() {
  const res = await fetch('/api/channels');
  const channels = await res.json();
  $('#channel-list').innerHTML = channels.map(c =>
    `<div class="channel" onclick="selectChannel('${c.name}')" data-ch="${c.name}">
      <span>${formatTitle(c.name)}</span><span class="count">${c.videoCount}</span>
    </div>`
  ).join('');
}

async function selectChannel(name) {
  current.channel = name;
  document.querySelectorAll('.channel').forEach(el => el.classList.toggle('active', el.dataset.ch === name));
  const res = await fetch(`/api/channel/${name}`);
  const videos = await res.json();
  $('#video-list').innerHTML = videos.length ? videos.map(v =>
    `<div class="video-card" onclick="selectVideo('${name}','${v.folder}')" data-f="${v.folder}">
      <div>${formatTitle(v.title)}</div><div class="date">${v.date}</div>
    </div>`
  ).join('') : '<div class="empty">No videos</div>';
  $('#content-area').innerHTML = '<div class="empty">Select a video</div>';
  $('#toolbar').style.display = 'none';
}

async function selectVideo(ch, folder) {
  current.channel = ch; current.folder = folder;
  document.querySelectorAll('.video-card').forEach(el => el.classList.toggle('active', el.dataset.f === folder));
  $('#toolbar').style.display = 'block';
  current.tab = 'analysis';
  updateTabButtons();
  await loadContent();
}

async function loadContent() {
  const key = `${current.channel}/${current.folder}/${current.tab}`;
  if (!cache[key]) {
    try {
      const res = await fetch(`/api/video/${current.channel}/${current.folder}/${current.tab}`);
      cache[key] = res.ok ? await res.text() : 'Content not available.';
    } catch { cache[key] = 'Failed to load.'; }
  }
  const text = cache[key];
  $('#content-area').innerHTML = current.tab === 'analysis' ? marked.parse(text) : `<pre style="white-space:pre-wrap">${text.replace(/</g,'&lt;')}</pre>`;
}

function showTab(tab) { current.tab = tab; updateTabButtons(); loadContent(); }
function updateTabButtons() {
  $('#btn-analysis').classList.toggle('active', current.tab === 'analysis');
  $('#btn-transcript').classList.toggle('active', current.tab === 'transcript');
}

loadChannels();
</script>
</body>
</html>
